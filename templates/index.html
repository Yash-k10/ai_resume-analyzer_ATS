<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="text-center">
        <h1>🚀 AI Resume Analyzer</h1>
        <p class="text-muted">By Yash Kapse</p>
    </div>

    <div class="card p-4 shadow mt-4">
        <form action="/upload" method="post" enctype="multipart/form-data">
            
            <div class="mb-3">
                <label class="form-label">Upload Resumes</label>
                <input type="file" name="resume" class="form-control" multiple required>
            </div>

            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea name="jd" class="form-control" rows="5"></textarea>
            </div>

            <button class="btn btn-primary w-100">Analyze & Rank</button>

        </form>
    </div>

</div>

</body>
</html>
