<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">📊 Resume Ranking Results</h2>

    <table class="table table-bordered table-striped shadow">
        <thead class="table-dark">
            <tr>
                <th>Rank</th>
                <th>Resume</th>
                <th>ATS Score</th>
                <th>Match %</th>
                <th>Missing Skills</th>
            </tr>
        </thead>

        <tbody>
        {% for r in results %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ r.name }}</td>
                <td>{{ r.score }}</td>
                <td>{{ r.match }}</td>
                <td>
                    {% if r.missing %}
                        {% for m in r.missing %}
                            <span class="badge bg-danger">{{m}}</span>
                        {% endfor %}
                    {% else %}
                        <span class="text-success">No major gaps</span>
                    {% endif %}
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

    <div class="text-center mt-3">
        <a href="/" class="btn btn-secondary">⬅️ Go Back</a>
    </div>

</div>

</body>
</html>
